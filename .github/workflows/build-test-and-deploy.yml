name: Build, Test, and Deploy SzyCo.Garage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: mount
  DOTNET_VERSION: 9.0.x
  NODE_VERSION: 22.x
  WEB_PROJECT_PATH: SzyCo.Garage.Web
  PUBLISH_DIR: ${{ github.workspace }}/publish

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Use .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_PROJECT_PATH }}/package-lock.json

      - name: Restore .NET tools
        if: hashFiles('.config/dotnet-tools.json') != ''
        run: dotnet tool restore

      - name: Install npm packages
        run: npm ci
        working-directory: ${{ env.WEB_PROJECT_PATH }}

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Check Coalesce has been run
        run: dotnet coalesce --what-if --verify
        working-directory: ${{ env.WEB_PROJECT_PATH }}

      # - name: Lint frontend
      #   run: npm run lint
      #   working-directory: ${{ env.WEB_PROJECT_PATH }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.WEB_PROJECT_PATH }}

      - name: Build solution
        run: dotnet build --configuration Release --no-restore --no-incremental

      - name: Run tests
        run: dotnet test --configuration Release --no-restore --no-build

      - name: Publish web app
        run: dotnet publish ${{ github.workspace }}/${{ env.WEB_PROJECT_PATH }}/SzyCo.Garage.Web.csproj --configuration Release --output ${{ env.PUBLISH_DIR }} --no-restore --no-build

      - name: Verify publish output
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: ls -la "${{ env.PUBLISH_DIR }}"

      - name: Zip published app
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          cd "${{ env.PUBLISH_DIR }}"
          zip -r "${{ github.workspace }}/web-app.zip" .

      - name: Upload artifact for deployment
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ${{ github.workspace }}/web-app.zip
          if-no-files-found: error
          retention-days: 1

  deploy-production:
    name: Deploy Production
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact for deployment
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./deployment-package

      - name: Verify deployment package
        run: |
          ls -la ./deployment-package
          unzip -l ./deployment-package/web-app.zip | head -50

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deployment-package/web-app.zip
